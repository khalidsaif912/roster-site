<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Import Duty Roster</title>
  <link rel="canonical" href="https://khalidsaif912.github.io/new/docs/">
  <meta http-equiv="refresh" content="0; url=https://khalidsaif912.github.io/new/docs/">
  <script>
  (function () {
    var canonicalBase = "https://khalidsaif912.github.io/new/docs/";
    var legacyPrefix = "/roster-site/";
    var path = location.pathname || "";
    var rest = "";
    var idx = path.indexOf(legacyPrefix);
    if (idx >= 0) {
      rest = path.slice(idx + legacyPrefix.length);
    } else if (/\/roster-site\/?$/.test(path)) {
      rest = "";
    } else {
      rest = path.replace(/^\//, "");
    }
    rest = rest.replace(/^\//, "");
    if (rest === "index.html") rest = "";
    var target = canonicalBase + rest;
    if (rest && !/\.[a-z0-9]+$/i.test(rest) && target.charAt(target.length - 1) !== "/") {
      target += "/";
    }
    location.replace(target + location.search + location.hash);
  })();
  </script>
</head>
<body>
  <p style="font-family:system-ui,sans-serif;text-align:center;margin-top:2rem">
    جاري التحويل إلى <a href="https://khalidsaif912.github.io/new/docs/">الموقع الحالي</a>…
  </p>
</body>
</html>
