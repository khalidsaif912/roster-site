<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>الاشتراك في Duty Roster</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f4f7f9;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .container { width: 100%; max-width: 400px; margin: 20px; }
    
    /* الهيدر الأزرق المتدرج */
    .header {
      background: linear-gradient(135deg, #4a90e2 0%, #2b78d2 100%);
      color: white;
      padding: 30px;
      border-radius: 20px 20px 0 0;
      text-align: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    
    /* الكارد */
    .card {
      background: white;
      padding: 30px;
      border-radius: 0 0 20px 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
    }

    .form-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 8px; font-weight: 600; color: #555; }
    
    input[type="email"] {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #eef2f6;
      border-radius: 12px;
      font-size: 16px;
      box-sizing: border-box;
      transition: 0.3s;
    }
    input[type="email"]:focus { outline: none; border-color: #4a90e2; }

    .radio-group {
      display: flex;
      gap: 10px;
      background: #f8fafc;
      padding: 10px;
      border-radius: 12px;
    }
    .radio-item { flex: 1; text-align: center; font-size: 14px; cursor: pointer; }

    button {
      width: 100%;
      padding: 15px;
      background: #1a73e8;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 17px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(26, 115, 232, 0.2);
      transition: 0.3s;
    }
    button:hover { background: #1557b0; transform: translateY(-2px); }
  </style>

<link rel="manifest" href="/roster-site/manifest.json">
<meta name="theme-color" content="#1a1208">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

</head>
<body>

<div class="container">
  <div class="header">
    <h1 style="margin:0; font-size: 24px;">📋 Duty Roster</h1>
    <p style="margin: 10px 0 0; font-size: 14px; opacity: 0.9;">اشترك لتصلك التحديثات اليومية</p>
  </div>

  <div class="card">
    <form method="POST" action="https://script.google.com/macros/s/AKfycbw8yomI7dN38o7O0-caVHZ8Hd28vGLZZyfyrNhvoAUmrQnoT7qm05SJydBx5miG1M9Jyg/exec" target="_blank">
      
      <div class="form-group">
        <label>البريد الإلكتروني</label>
        <input type="email" name="email" placeholder="example@mail.com" required>
      </div>

      <div class="form-group">
        <label>نطاق التحديثات</label>
        <div class="radio-group">
          <label class="radio-item"><input type="radio" name="mode" value="ALL" checked> الكل</label>
          <label class="radio-item"><input type="radio" name="mode" value="CURRENT"> الحالي</label>
        </div>
      </div>

      <input type="hidden" name="lang" value="ar">

      <button type="submit">تأكيد الاشتراك</button>
    </form>
  </div>
</div>


<script src="/roster-site/install-pwa.js"></script>

<script src="/roster-site/eid-overlay.js"></script></body>
</html>
