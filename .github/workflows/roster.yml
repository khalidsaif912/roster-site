name: Roster Site + Email

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      # ======================
      # 🔹 توليد الموقع
      # ======================
      - name: Generate page
        env:
          EXCEL_URL: ${{ secrets.EXPORT_EXCEL_URL }}
          SOURCE_NAME_URL: ${{ secrets.EXPORT_SOURCE_NAME_URL }}
          PAGES_BASE_URL: ${{ secrets.PAGES_BASE_URL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          SUBSCRIBE_URL: ${{ secrets.SUBSCRIBE_URL }}
          SUBSCRIBE_TOKEN: ${{ secrets.SUBSCRIBE_TOKEN }}
          SEND_EMAIL: "false"
        run: python generate_and_send.py

      - name: Send Email
        env:
          EXCEL_URL: ${{ secrets.EXPORT_EXCEL_URL }}
          SOURCE_NAME_URL: ${{ secrets.EXPORT_SOURCE_NAME_URL }}
          PAGES_BASE_URL: ${{ secrets.PAGES_BASE_URL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          SUBSCRIBE_URL: ${{ secrets.SUBSCRIBE_URL }}
          SUBSCRIBE_TOKEN: ${{ secrets.SUBSCRIBE_TOKEN }}
          SEND_EMAIL: "true"
        run: python generate_and_send.py

      # ======================
      # 🔥 PWA (الجزء المهم)
      # ======================
      - name: Add PWA support
        run: |

          # ===== manifest =====
          cat > docs/manifest.json <<'EOF'
          {
            "name": "الأذكار",
            "short_name": "الأذكار",
            "start_url": "/roster-site/",
            "display": "standalone",
            "background_color": "#1a1208",
            "theme_color": "#1a1208"
          }
          EOF

          # ===== service worker =====
          cat > docs/sw.js <<'EOF'
          self.addEventListener('install', e => self.skipWaiting());
          self.addEventListener('activate', e => self.clients.claim());
          self.addEventListener('fetch', e => e.respondWith(fetch(e.request)));
          EOF

          # ===== install script (مصحح) =====
          cat > docs/install-pwa.js <<'EOF'
          (function () {
            let deferredPrompt = null;

            const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
            const isStandalone =
              window.matchMedia('(display-mode: standalone)').matches ||
              window.navigator.standalone === true;

            function createBanner() {
              if (document.getElementById('install-banner')) return;

              const banner = document.createElement('div');
              banner.id = 'install-banner';

              banner.style.cssText = `
                position:fixed;
                bottom:20px;
                left:50%;
                transform:translateX(-50%);
                background:#1a1208;
                border:1px solid #c9a84c;
                border-radius:14px;
                padding:12px 16px;
                z-index:9999;
                display:flex;
                gap:10px;
                align-items:center;
                direction:rtl;
              `;

              banner.innerHTML = `
                <span style="color:#e8c97a;font-size:14px">ثبّت التطبيق</span>
                <button id="installBtn">تثبيت</button>
                <button id="closeBtn">✕</button>
              `;

              document.body.appendChild(banner);

              document.getElementById('installBtn').onclick = async () => {
                if (deferredPrompt) {
                  deferredPrompt.prompt();
                  await deferredPrompt.userChoice;
                } else if (isIOS) {
                  alert("اضغط مشاركة ثم Add to Home Screen");
                } else {
                  alert("من قائمة المتصفح اختر Install App");
                }
              };

              document.getElementById('closeBtn').onclick = () => {
                banner.remove();
              };
            }

            window.addEventListener('beforeinstallprompt', e => {
              e.preventDefault();
              deferredPrompt = e;
            });

            window.addEventListener('load', () => {
              if (!isStandalone) {
                setTimeout(createBanner, 1000);
              }
            });

            if ('serviceWorker' in navigator) {
              navigator.serviceWorker.register('/roster-site/sw.js?v=5');
            }
          })();
          EOF

          # ===== inject =====
          python <<'EOF'
          from pathlib import Path

          for f in Path("docs").rglob("*.html"):
              html = f.read_text()

              if "manifest.json" not in html:
                  html = html.replace("</head>",
                  '<link rel="manifest" href="/roster-site/manifest.json?v=5"></head>')

              if "install-pwa.js?v=5" not in html:
                  html = html.replace("</body>",
                  '<script src="/roster-site/install-pwa.js?v=5"></script></body>')

              f.write_text(html)
          EOF

      # ======================
      # 💾 commit
      # ======================
      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add docs
          git commit -m "Update site + PWA" || echo "No changes"
          git push
