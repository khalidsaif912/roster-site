name: Roster Site + Email

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      # ======================
      # 🔹 توليد الموقع
      # ======================
      - name: Generate page
        env:
          EXCEL_URL: ${{ secrets.EXPORT_EXCEL_URL }}
          SOURCE_NAME_URL: ${{ secrets.EXPORT_SOURCE_NAME_URL }}
          PAGES_BASE_URL: ${{ secrets.PAGES_BASE_URL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          SUBSCRIBE_URL: ${{ secrets.SUBSCRIBE_URL }}
          SUBSCRIBE_TOKEN: ${{ secrets.SUBSCRIBE_TOKEN }}
          SEND_EMAIL: "false"
        run: python generate_and_send.py

      - name: Send Email
        env:
          EXCEL_URL: ${{ secrets.EXPORT_EXCEL_URL }}
          SOURCE_NAME_URL: ${{ secrets.EXPORT_SOURCE_NAME_URL }}
          PAGES_BASE_URL: ${{ secrets.PAGES_BASE_URL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          SUBSCRIBE_URL: ${{ secrets.SUBSCRIBE_URL }}
          SUBSCRIBE_TOKEN: ${{ secrets.SUBSCRIBE_TOKEN }}
          SEND_EMAIL: "true"
        run: python generate_and_send.py

      # ======================
      # 🔥 PWA (نسخة ذكية للروستر)
      # ======================
      - name: Add PWA support
        run: |

          # ===== manifest (خاص بالروستر) =====
          cat > docs/manifest.json <<'EOF'
          {
            "name": "Roster Schedule",
            "short_name": "Roster",
            "start_url": "/roster-site/",
            "display": "standalone",
            "orientation": "any",
            "background_color": "#1a1208",
            "theme_color": "#1a1208",
            "lang": "ar",
            "dir": "rtl",
            "icons": [
              {
                "src": "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' fill='%231a1208'/%3E%3Ctext x='96' y='130' font-size='90' text-anchor='middle' fill='%23c9a84c'%3ER%3C/text%3E%3C/svg%3E",
                "sizes": "192x192",
                "type": "image/svg+xml"
              },
              {
                "src": "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' fill='%231a1208'/%3E%3Ctext x='256' y='340' font-size='240' text-anchor='middle' fill='%23c9a84c'%3ER%3C/text%3E%3C/svg%3E",
                "sizes": "512x512",
                "type": "image/svg+xml"
              }
            ]
          }
          EOF

          # ===== service worker =====
          cat > docs/sw.js <<'EOF'
          self.addEventListener('install', e => self.skipWaiting());
          self.addEventListener('activate', e => self.clients.claim());
          self.addEventListener('fetch', e => e.respondWith(fetch(e.request)));
          EOF

          # ===== سكربت التثبيت (بدون alert) =====
          cat > docs/install-pwa.js <<'EOF'
          (function () {

            let deferredPrompt = null;

            const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
            const isStandalone =
              window.matchMedia('(display-mode: standalone)').matches ||
              window.navigator.standalone === true;

            function createBanner() {
              if (document.getElementById('install-banner')) return;

              const banner = document.createElement('div');
              banner.id = 'install-banner';

              banner.style.cssText = `
                position:fixed;
                bottom:20px;
                left:50%;
                transform:translateX(-50%);
                background:#1a1208;
                border:1px solid #c9a84c;
                border-radius:14px;
                padding:12px 16px;
                z-index:9999;
                display:flex;
                gap:10px;
                align-items:center;
                direction:rtl;
              `;

              banner.innerHTML = `
                <span style="color:#e8c97a;font-size:14px">إضافة للتطبيق</span>
                <button id="installBtn">فتح الطريقة</button>
                <button id="closeBtn">✕</button>
              `;

              document.body.appendChild(banner);

              document.getElementById('installBtn').onclick = async () => {

                if (deferredPrompt) {
                  deferredPrompt.prompt();
                  await deferredPrompt.userChoice;
                  return;
                }

                showHelp();
              };

              document.getElementById('closeBtn').onclick = () => {
                banner.remove();
              };
            }

            function showHelp() {
              if (document.getElementById('pwa-help')) return;

              const box = document.createElement('div');
              box.id = 'pwa-help';

              box.style.cssText = `
                position:fixed;
                bottom:0;
                left:0;
                right:0;
                background:#1e1508;
                color:#e8c97a;
                padding:20px;
                z-index:99999;
                direction:rtl;
                border-radius:20px 20px 0 0;
              `;

              box.innerHTML = `
                <h3>طريقة إضافة التطبيق</h3>
                <p>افتح قائمة المتصفح ثم اختر:</p>
                <p style="font-weight:bold">Add to Home Screen</p>
                <button onclick="this.parentElement.remove()">إغلاق</button>
              `;

              document.body.appendChild(box);
            }

            window.addEventListener('beforeinstallprompt', e => {
              e.preventDefault();
              deferredPrompt = e;
            });

            window.addEventListener('load', () => {
              if (!isStandalone) {
                setTimeout(createBanner, 1200);
              }
            });

            if ('serviceWorker' in navigator) {
              navigator.serviceWorker.register('/roster-site/sw.js?v=7');
            }

          })();
          EOF

          # ===== inject =====
          python <<'EOF'
          from pathlib import Path

          for f in Path("docs").rglob("*.html"):
              html = f.read_text()

              if "manifest.json" not in html:
                  html = html.replace("</head>",
                  '<link rel="manifest" href="/roster-site/manifest.json?v=7"></head>')

              if "install-pwa.js?v=7" not in html:
                  html = html.replace("</body>",
                  '<script src="/roster-site/install-pwa.js?v=7"></script></body>')

              f.write_text(html)
          EOF

      # ======================
      # 💾 Commit
      # ======================
      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add docs
          git commit -m "Update roster site + PWA UX" || echo "No changes"
          git push
