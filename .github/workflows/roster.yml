name: Roster Site + Email
on:
  workflow_dispatch:
    inputs:
      force_generate:
        description: "إجبار توليد الصفحة"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  schedule:
    - cron: "*/10 * * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - name: Generate page
        env:
          EXCEL_URL: ${{ secrets.EXPORT_EXCEL_URL }}
          SOURCE_NAME_URL: ${{ secrets.EXPORT_SOURCE_NAME_URL }}
          PAGES_BASE_URL: ${{ secrets.PAGES_BASE_URL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          SUBSCRIBE_URL: ${{ secrets.SUBSCRIBE_URL }}
          SUBSCRIBE_TOKEN: ${{ secrets.SUBSCRIBE_TOKEN }}
          SEND_EMAIL: "false"
        run: python generate_and_send.py

      - name: Send Email
        env:
          EXCEL_URL: ${{ secrets.EXPORT_EXCEL_URL }}
          SOURCE_NAME_URL: ${{ secrets.EXPORT_SOURCE_NAME_URL }}
          PAGES_BASE_URL: ${{ secrets.PAGES_BASE_URL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          SUBSCRIBE_URL: ${{ secrets.SUBSCRIBE_URL }}
          SUBSCRIBE_TOKEN: ${{ secrets.SUBSCRIBE_TOKEN }}
          SEND_EMAIL: "true"
        run: python generate_and_send.py

      # ✅ إضافة PWA (آخر خطوة قبل commit)
      - name: Add PWA support
        run: |
          cat > docs/install-pwa.js <<'EOF'
          (function () {
            let deferredPrompt = null;

            function addInstallButton() {
              if (document.getElementById('installWrap')) return;

              const wrap = document.createElement('div');
              wrap.id = 'installWrap';
              wrap.style.position = 'fixed';
              wrap.style.left = '50%';
              wrap.style.bottom = '20px';
              wrap.style.transform = 'translateX(-50%)';
              wrap.style.zIndex = '99999';

              wrap.innerHTML = `
                <button id="installBtn" style="
                  border:none;
                  border-radius:16px;
                  padding:14px 28px;
                  font-size:15px;
                  font-weight:800;
                  cursor:pointer;
                  color:#fff;
                  background:linear-gradient(135deg,#16a34a,#22c55e);
                ">📲 تثبيت التطبيق</button>
              `;

              document.body.appendChild(wrap);

              document.getElementById('installBtn').onclick = async () => {
                if (deferredPrompt) {
                  deferredPrompt.prompt();
                  await deferredPrompt.userChoice;
                } else {
                  alert("استخدم Add to Home Screen من المتصفح");
                }
              };
            }

            window.addEventListener('beforeinstallprompt', e => {
              e.preventDefault();
              deferredPrompt = e;
            });

            window.addEventListener('load', addInstallButton);

            if ('serviceWorker' in navigator) {
              navigator.serviceWorker.register('/roster-site/sw.js');
            }
          })();
          EOF

          cat > docs/manifest.json <<'EOF'
          {
            "name": "الأذكار",
            "short_name": "الأذكار",
            "start_url": "/roster-site/",
            "display": "standalone",
            "background_color": "#1a1208",
            "theme_color": "#1a1208"
          }
          EOF

          cat > docs/sw.js <<'EOF'
          self.addEventListener('install', e => self.skipWaiting());
          self.addEventListener('fetch', e => e.respondWith(fetch(e.request)));
          EOF

          python <<'EOF'
          from pathlib import Path
          for f in Path("docs").rglob("*.html"):
              html = f.read_text()

              if "manifest.json" not in html:
                  html = html.replace("</head>",
                  '<link rel="manifest" href="/roster-site/manifest.json"></head>')

              if "install-pwa.js" not in html:
                  html = html.replace("</body>",
                  '<script src="/roster-site/install-pwa.js"></script></body>')

              f.write_text(html)
          EOF

      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add docs
          git commit -m "Update site + PWA" || echo "No changes"
          git push
