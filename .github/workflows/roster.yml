name: Roster Site + Email

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - name: Check if roster changed
        id: check_changes
        env:
          SOURCE_NAME_URL: ${{ secrets.EXPORT_SOURCE_NAME_URL }}
        run: |
          python << 'EOF'
          import os
          import requests
          from pathlib import Path

          source_url = os.getenv("SOURCE_NAME_URL", "").strip()
          if not source_url:
              raise SystemExit("SOURCE_NAME_URL not found")

          response = requests.get(source_url, timeout=20)
          response.raise_for_status()
          current_filename = response.text.strip()

          if not current_filename:
              raise SystemExit("source_name.txt is empty")

          cache_file = Path("last_filename.txt")
          previous_filename = cache_file.read_text(encoding="utf-8").strip() if cache_file.exists() else ""
          changed = str(previous_filename != current_filename).lower()

          cache_file.write_text(current_filename, encoding="utf-8")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write(f"changed={changed}\n")
              f.write(f"current_filename={current_filename}\n")
              f.write(f"previous_filename={previous_filename}\n")

          print(f"Previous: {previous_filename or '(none)'}")
          print(f"Current : {current_filename}")
          print(f"Changed : {changed}")
          EOF

      - name: Generate page
        env:
          EXCEL_URL: ${{ secrets.EXPORT_EXCEL_URL }}
          SOURCE_NAME_URL: ${{ secrets.EXPORT_SOURCE_NAME_URL }}
          PAGES_BASE_URL: ${{ secrets.PAGES_BASE_URL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          SUBSCRIBE_URL: ${{ secrets.SUBSCRIBE_URL }}
          SUBSCRIBE_TOKEN: ${{ secrets.SUBSCRIBE_TOKEN }}
          SEND_EMAIL: "false"
        run: python generate_and_send.py

      - name: Send Email only if roster changed
        if: steps.check_changes.outputs.changed == 'true'
        env:
          EXCEL_URL: ${{ secrets.EXPORT_EXCEL_URL }}
          SOURCE_NAME_URL: ${{ secrets.EXPORT_SOURCE_NAME_URL }}
          PAGES_BASE_URL: ${{ secrets.PAGES_BASE_URL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          SUBSCRIBE_URL: ${{ secrets.SUBSCRIBE_URL }}
          SUBSCRIBE_TOKEN: ${{ secrets.SUBSCRIBE_TOKEN }}
          SEND_EMAIL: "true"
          CHANGED: "true"
          IS_MORNING_EMAIL: "false"
        run: python generate_and_send.py

      - name: Add PWA support
        run: |
          cat > docs/manifest.json <<'EOF'
          {
            "name": "Roster Schedule",
            "short_name": "Roster",
            "start_url": "/roster-site/",
            "display": "standalone",
            "orientation": "any",
            "background_color": "#1a1208",
            "theme_color": "#1a1208",
            "lang": "ar",
            "dir": "rtl",
            "icons": [
              {
                "src": "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' fill='%231a1208'/%3E%3Ctext x='96' y='130' font-size='90' text-anchor='middle' fill='%23c9a84c'%3ER%3C/text%3E%3C/svg%3E",
                "sizes": "192x192",
                "type": "image/svg+xml"
              },
              {
                "src": "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' fill='%231a1208'/%3E%3Ctext x='256' y='340' font-size='240' text-anchor='middle' fill='%23c9a84c'%3ER%3C/text%3E%3C/svg%3E",
                "sizes": "512x512",
                "type": "image/svg+xml"
              }
            ]
          }
          EOF

          cat > docs/sw.js <<'EOF'
          self.addEventListener('install', e => self.skipWaiting());
          self.addEventListener('activate', e => self.clients.claim());
          self.addEventListener('fetch', e => e.respondWith(fetch(e.request)));
          EOF

          cat > docs/install-pwa.js <<'EOF'
          (function () {
            let deferredPrompt = null;

            const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
            const isStandalone =
              window.matchMedia('(display-mode: standalone)').matches ||
              window.navigator.standalone === true;

            const DISMISS_KEY = 'roster_pwa_banner_dismissed_v1';

            function bannerDismissed() {
              return localStorage.getItem(DISMISS_KEY) === '1';
            }

            function setBannerDismissed() {
              localStorage.setItem(DISMISS_KEY, '1');
            }

            function resetDismissIfInstallAvailable() {
              if (deferredPrompt) {
                localStorage.removeItem(DISMISS_KEY);
              }
            }

            function createBanner() {
              if (document.getElementById('install-banner')) return;
              if (isStandalone) return;
              if (bannerDismissed()) return;

              const banner = document.createElement('div');
              banner.id = 'install-banner';

              banner.style.cssText = `
                position:fixed;
                bottom:16px;
                left:50%;
                transform:translateX(-50%) translateY(20px);
                opacity:0;
                background:rgba(20,20,24,0.94);
                border:1px solid rgba(201,168,76,0.28);
                border-radius:16px;
                padding:10px 12px;
                z-index:9999;
                display:flex;
                align-items:center;
                gap:10px;
                direction:rtl;
                min-width:260px;
                max-width:calc(100vw - 24px);
                box-shadow:0 10px 30px rgba(0,0,0,0.28);
                backdrop-filter:blur(12px);
                transition:opacity .25s ease, transform .25s ease;
                font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
              `;

              banner.innerHTML = `
                <div style="display:flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:10px;background:rgba(201,168,76,0.10);color:#e8c97a;flex-shrink:0;font-size:15px;">📱</div>

                <div style="flex:1;min-width:0;line-height:1.35">
                  <div id="installBannerTitle" style="color:#f5ead8;font-size:13px;font-weight:700;">إضافة الروستر</div>
                  <div id="installBannerSub" style="color:#b8a57a;font-size:11px;margin-top:2px;">افتحه بسرعة مثل التطبيق</div>
                </div>

                <button id="installBtn" style="
                  border:none;
                  border-radius:10px;
                  padding:8px 12px;
                  font-size:12px;
                  font-weight:700;
                  cursor:pointer;
                  color:#1a1208;
                  background:linear-gradient(135deg,#b8922f,#e0bd63);
                  box-shadow:0 4px 12px rgba(201,168,76,0.22);
                  white-space:nowrap;
                  flex-shrink:0;
                ">طريقة التثبيت</button>

                <button id="closeBtn" style="
                  border:none;
                  background:transparent;
                  color:#8f825f;
                  font-size:16px;
                  cursor:pointer;
                  width:26px;
                  height:26px;
                  border-radius:8px;
                  flex-shrink:0;
                ">✕</button>
              `;

              document.body.appendChild(banner);

              requestAnimationFrame(() => {
                banner.style.opacity = '1';
                banner.style.transform = 'translateX(-50%) translateY(0)';
              });

              updateBannerText();

              document.getElementById('installBtn').onclick = async () => {
                if (deferredPrompt) {
                  try {
                    deferredPrompt.prompt();
                    await deferredPrompt.userChoice;
                  } catch (e) {}
                  return;
                }

                showHelp();
              };

              document.getElementById('closeBtn').onclick = () => {
                hideBanner(true);
              };
            }

            function hideBanner(remember = false) {
              const banner = document.getElementById('install-banner');
              if (!banner) return;

              banner.style.opacity = '0';
              banner.style.transform = 'translateX(-50%) translateY(20px)';

              setTimeout(() => {
                banner.remove();
              }, 250);

              if (remember) setBannerDismissed();
            }

            function updateBannerText() {
              const btn = document.getElementById('installBtn');
              const title = document.getElementById('installBannerTitle');
              const sub = document.getElementById('installBannerSub');
              if (!btn || !title || !sub) return;

              if (deferredPrompt) {
                title.textContent = 'تثبيت الروستر';
                sub.textContent = 'جاهز للإضافة على جهازك';
                btn.textContent = 'تثبيت الآن';
              } else {
                title.textContent = 'إضافة الروستر';
                sub.textContent = 'خطوات بسيطة لفتحه مثل التطبيق';
                btn.textContent = 'طريقة التثبيت';
              }
            }

            function showHelp() {
              if (document.getElementById('pwa-help')) return;

              const box = document.createElement('div');
              box.id = 'pwa-help';

              box.style.cssText = `
                position:fixed;
                inset:auto 0 0 0;
                background:#17181d;
                color:#f3e6c1;
                padding:22px 18px 24px;
                z-index:10000;
                direction:rtl;
                border-top-left-radius:22px;
                border-top-right-radius:22px;
                box-shadow:0 -10px 30px rgba(0,0,0,0.30);
                font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
              `;

              const helpText = isIOS
                ? `
                  <div style="color:#c7b384;font-size:13px;line-height:1.9">
                    1) افتح زر المشاركة في المتصفح<br>
                    2) اختر <b style="color:#f3e6c1">Add to Home Screen</b><br>
                    3) اضغط <b style="color:#f3e6c1">Add</b>
                  </div>
                `
                : `
                  <div style="color:#c7b384;font-size:13px;line-height:1.9">
                    إذا لم تظهر نافذة التثبيت تلقائيًا، أضف الصفحة إلى الشاشة الرئيسية من خيارات المتصفح.<br>
                    بعض المتصفحات لا تعرض نافذة التثبيت المباشرة دائمًا.
                  </div>
                `;

              box.innerHTML = `
                <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:10px;">
                  <div style="font-size:16px;font-weight:800;color:#f5ead8;">طريقة إضافة الروستر</div>
                  <button id="closeHelpBtn" style="
                    border:none;
                    background:rgba(255,255,255,0.05);
                    color:#b8a57a;
                    width:30px;
                    height:30px;
                    border-radius:10px;
                    font-size:15px;
                    cursor:pointer;
                  ">✕</button>
                </div>

                ${helpText}

                <button id="closeHelpMainBtn" style="
                  margin-top:16px;
                  width:100%;
                  border:none;
                  border-radius:12px;
                  padding:12px;
                  font-size:13px;
                  font-weight:700;
                  cursor:pointer;
                  color:#1a1208;
                  background:linear-gradient(135deg,#b8922f,#e0bd63);
                ">حسنًا</button>
              `;

              document.body.appendChild(box);

              document.getElementById('closeHelpBtn').onclick = () => box.remove();
              document.getElementById('closeHelpMainBtn').onclick = () => box.remove();
            }

            function tryShowBanner() {
              if (isStandalone) return;
              if (bannerDismissed()) return;
              createBanner();
            }

            window.addEventListener('beforeinstallprompt', e => {
              e.preventDefault();
              deferredPrompt = e;
              resetDismissIfInstallAvailable();
              updateBannerText();
              tryShowBanner();
            });

            window.addEventListener('appinstalled', () => {
              deferredPrompt = null;
              hideBanner(false);
            });

            window.addEventListener('load', () => {
              if (isStandalone) return;

              setTimeout(() => {
                tryShowBanner();
              }, 5000);

              window.addEventListener('scroll', function onFirstScroll() {
                tryShowBanner();
                window.removeEventListener('scroll', onFirstScroll);
              }, { passive: true });

              window.addEventListener('touchstart', function onFirstTouch() {
                tryShowBanner();
                window.removeEventListener('touchstart', onFirstTouch);
              }, { passive: true, once: true });
            });

            if ('serviceWorker' in navigator) {
              navigator.serviceWorker.register('/roster-site/sw.js?v=8');
            }
          })();
          EOF

          cat > docs/banner-changer.js <<'EOF'
          (function () {
            const BANNER_KEY = 'roster_banner_choice';
            const BANNERS_PATH = 'https://khalidsaif912.github.io/roster-site/assets/banners/';

            // عدّل هذه القائمة بأسماء الصور الفعلية في مجلد assets/banners/
            const availableBanners = [
              'banner1.jpg',
              'banner2.jpg',
              'banner3.jpg',
              'banner4.jpg',
              'banner5.jpg',
              'banner6.jpg',
              'banner7.jpg',
              'banner8.jpg',
              'banner9.jpg',
              'banner10.jpg',
              'banner11.jpg',
              'banner12.jpg',
              'banner13.jpg',
              'banner14.jpg',
              'banner15.jpg',
              'banner16.jpg',
              'banner17.jpg',
              'banner18.jpg',
              'banner19.jpg',
              'banner20.jpg'
            ];

            function getSavedBanner() {
              return localStorage.getItem(BANNER_KEY) || null;
            }

            function saveBannerChoice(name) {
              localStorage.setItem(BANNER_KEY, name);
            }

            function applyBanner(name) {
              const headerEl = document.querySelector('.header');
              if (!headerEl) return;
              headerEl.style.backgroundImage = "url('" + BANNERS_PATH + name + "')";
              headerEl.style.backgroundSize = 'cover';
              headerEl.style.backgroundPosition = 'center';
              headerEl.style.backgroundRepeat = 'no-repeat';
            }

            function clearBanner() {
              const headerEl = document.querySelector('.header');
              if (!headerEl) return;
              headerEl.style.backgroundImage = '';
              headerEl.style.backgroundSize = '';
              headerEl.style.backgroundPosition = '';
              headerEl.style.backgroundRepeat = '';
            }

            function createChangerBtn() {
              if (document.getElementById('banner-changer-btn')) return;
              const headerEl = document.querySelector('.header');
              if (!headerEl) return;

              const btn = document.createElement('button');
              btn.id = 'banner-changer-btn';
              btn.textContent = '🖼️';
              btn.title = 'تغيير خلفية الهيدر';
              btn.style.cssText = [
                'position:absolute',
                'top:8px',
                'left:8px',
                'z-index:999',
                'background:transparent',
                'border:none',
                'color:#fff',
                'padding:8px',
                'font-size:16px',
                'cursor:pointer',
                'line-height:1',
                'opacity:0.85',
                '-webkit-tap-highlight-color:transparent',
                'touch-action:manipulation',
                'min-width:36px',
                'min-height:36px',
                'display:flex',
                'align-items:center',
                'justify-content:center'
              ].join(';');

              if (getComputedStyle(headerEl).position === 'static') {
                headerEl.style.position = 'relative';
              }

              headerEl.appendChild(btn);
              btn.onclick = function(e) { e.stopPropagation(); showBannerPicker(); };
            }

            function showBannerPicker() {
              if (document.getElementById('banner-picker')) return;

              const overlay = document.createElement('div');
              overlay.id = 'banner-picker';
              overlay.style.cssText = [
                'position:fixed',
                'inset:0',
                'background:rgba(0,0,0,0.65)',
                'z-index:10000',
                'display:flex',
                'align-items:flex-end',
                'justify-content:center',
                'font-family:system-ui,-apple-system,sans-serif'
              ].join(';');

              const sheet = document.createElement('div');
              sheet.style.cssText = [
                'background:#17181d',
                'border-top-left-radius:20px',
                'border-top-right-radius:20px',
                'padding:18px 16px 28px',
                'width:100%',
                'max-width:480px',
                'direction:rtl'
              ].join(';');

              const current = getSavedBanner();

              sheet.innerHTML =
                '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">' +
                  '<span style="color:#f5ead8;font-size:15px;font-weight:700;">اختر خلفية الهيدر</span>' +
                  '<button id="closePicker" style="background:rgba(255,255,255,0.06);border:none;color:#b8a57a;width:28px;height:28px;border-radius:8px;font-size:15px;cursor:pointer;">✕</button>' +
                '</div>' +
                '<div id="bannerGrid" style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;"></div>' +
                '<button id="resetBanner" style="margin-top:12px;width:100%;border:none;border-radius:12px;padding:10px;font-size:13px;font-weight:700;cursor:pointer;color:#b8a57a;background:rgba(255,255,255,0.05);">إعادة الخلفية الافتراضية</button>';

              overlay.appendChild(sheet);
              document.body.appendChild(overlay);

              const grid = document.getElementById('bannerGrid');

              availableBanners.forEach(function(name) {
                const wrap = document.createElement('div');
                wrap.style.cssText = 'border-radius:10px;overflow:hidden;cursor:pointer;border:2px solid ' + (name === current ? '#e0bd63' : 'transparent') + ';transition:border .15s;';
                const img = document.createElement('img');
                img.src = BANNERS_PATH + name;
                img.style.cssText = 'width:100%;height:70px;object-fit:cover;display:block;';
                img.onerror = function() { wrap.style.display = 'none'; };
                wrap.appendChild(img);
                grid.appendChild(wrap);
                wrap.onclick = function() {
                  saveBannerChoice(name);
                  applyBanner(name);
                  overlay.remove();
                };
              });

              document.getElementById('resetBanner').onclick = function() {
                localStorage.removeItem(BANNER_KEY);
                clearBanner();
                overlay.remove();
              };

              document.getElementById('closePicker').onclick = function() { overlay.remove(); };
              overlay.onclick = function(e) { if (e.target === overlay) overlay.remove(); };
            }

            function init() {
              const saved = getSavedBanner();
              if (saved) applyBanner(saved);
              createChangerBtn();
            }

            function waitForHeader() {
              if (document.querySelector('.header')) { init(); return; }
              const observer = new MutationObserver(function() {
                if (document.querySelector('.header')) {
                  observer.disconnect();
                  init();
                }
              });
              observer.observe(document.body, { childList: true, subtree: true });
            }

            if (document.readyState === 'loading') {
              document.addEventListener('DOMContentLoaded', waitForHeader);
            } else {
              waitForHeader();
            }
          })();
          EOF

          python <<'EOF'
          from pathlib import Path

          for f in Path("docs").rglob("*.html"):
              html = f.read_text()

              html = html.replace('/roster-site/manifest.json?v=7', '/roster-site/manifest.json?v=8')
              html = html.replace('/roster-site/install-pwa.js?v=7', '/roster-site/install-pwa.js?v=8')

              if "manifest.json" not in html:
                  html = html.replace(
                      "</head>",
                      '<link rel="manifest" href="/roster-site/manifest.json?v=8"></head>'
                  )

              if "install-pwa.js?v=8" not in html:
                  html = html.replace(
                      "</body>",
                      '<script src="/roster-site/install-pwa.js?v=8"></script><script src="/roster-site/banner-changer.js"></script></body>'
                  )
              elif "banner-changer.js" not in html:
                  html = html.replace(
                      '<script src="/roster-site/install-pwa.js?v=8"></script></body>',
                      '<script src="/roster-site/install-pwa.js?v=8"></script><script src="/roster-site/banner-changer.js"></script></body>'
                  )

              f.write_text(html)
          EOF

      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add docs last_filename.txt
          git commit -m "Update roster site + PWA UX" || echo "No changes"
          git push
