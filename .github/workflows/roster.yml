name: Roster Site + Email
on:
  workflow_dispatch:
    inputs:
      force_generate:
        description: "إجبار توليد الصفحة (حتى لو لم يتغير الملف)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  schedule:
    - cron: "*/10 * * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      
      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Check if Excel file changed
        id: check_changes
        env:
          SOURCE_NAME_URL: ${{ secrets.EXPORT_SOURCE_NAME_URL }}
          FORCE_GENERATE: ${{ github.event.inputs.force_generate || 'false' }}
        run: |
          python << 'EOF'
          import os, requests, sys
          from pathlib import Path
          from datetime import datetime, timezone, timedelta
          
          source_url = os.getenv('SOURCE_NAME_URL')
          response = requests.get(source_url, timeout=15)
          current_filename = response.text.strip()

          cache_file = "last_filename.txt"
          changed = True
          old_filename = "none"

          if Path(cache_file).exists():
              old_filename = Path(cache_file).read_text().strip()
              changed = (old_filename != current_filename)

          Path(cache_file).write_text(current_filename)

          muscat_tz = timezone(timedelta(hours=4))
          now = datetime.now(muscat_tz)
          current_hour = now.hour

          mandatory_update_hours = [0,5,6,13,14,20,21]
          is_mandatory_update = current_hour in mandatory_update_hours
          is_morning_email = current_hour in [7,8]
          is_manual = os.getenv('GITHUB_EVENT_NAME') == 'workflow_dispatch'
          force_generate = os.getenv('FORCE_GENERATE','false') == 'true'

          should_process = changed or is_mandatory_update or is_manual or force_generate
          should_send_email = changed or is_morning_email or is_manual

          with open(os.environ['GITHUB_OUTPUT'],'a') as f:
              f.write(f"should_process={str(should_process).lower()}\n")
              f.write(f"should_send_email={str(should_send_email).lower()}\n")
              f.write(f"filename={current_filename}\n")
          EOF

      - name: Generate page
        if: steps.check_changes.outputs.should_process == 'true'
        run: python generate_and_send.py

      - name: Generate absence data
        if: steps.check_changes.outputs.should_process == 'true'
        run: |
          [ -f process_absence.py ] && python process_absence.py || echo "skip"

      - name: Send Email Notification
        if: steps.check_changes.outputs.should_send_email == 'true'
        run: python generate_and_send.py

      - name: Generate employee schedules
        if: steps.check_changes.outputs.should_process == 'true'
        run: |
          [ -f generate_employee_schedules.py ] && python generate_employee_schedules.py || echo "skip"

      # 🔥 هنا نبدأ التعديلات النهائية (الأهم)
      - name: Inject Eid overlay
        if: steps.check_changes.outputs.should_process == 'true'
        run: |
          sed -i 's|<script src="/roster-site/eid-overlay.js"></script>||g' docs/**/*.html || true
          sed -i 's|</body>|<script src="/roster-site/eid-overlay.js"></script></body>|g' docs/**/*.html || true

      - name: Add optional PWA install support
        if: steps.check_changes.outputs.should_process == 'true'
        run: |
          cat > docs/manifest.json <<'EOF'
          {
            "name": "الأذكار",
            "short_name": "الأذكار",
            "start_url": "/roster-site/",
            "display": "standalone",
            "background_color": "#1a1208",
            "theme_color": "#1a1208"
          }
          EOF

          cat > docs/sw.js <<'EOF'
          self.addEventListener('install', e => self.skipWaiting());
          self.addEventListener('fetch', e => e.respondWith(fetch(e.request)));
          EOF

          cat > docs/install-pwa.js <<'EOF'
          (function(){
            let deferredPrompt;

            function showBtn(){
              let btn = document.createElement('button');
              btn.innerText="📲 تثبيت التطبيق";
              btn.style.cssText="position:fixed;bottom:20px;left:50%;transform:translateX(-50%);padding:12px 20px;border-radius:12px;background:#22c55e;color:#fff;border:none;z-index:9999;";
              document.body.appendChild(btn);

              btn.onclick=()=>{
                if(deferredPrompt){
                  deferredPrompt.prompt();
                }else{
                  alert("استخدم Add to Home Screen من المتصفح");
                }
              }
            }

            window.addEventListener('beforeinstallprompt', e=>{
              e.preventDefault();
              deferredPrompt=e;
              showBtn();
            });

            if('serviceWorker' in navigator){
              navigator.serviceWorker.register('/roster-site/sw.js');
            }

            showBtn();
          })();
          EOF

          python <<'EOF'
          from pathlib import Path

          for f in Path("docs").rglob("*.html"):
              html=f.read_text()

              if "manifest.json" not in html:
                  html=html.replace("</head>",
                  '<link rel="manifest" href="/roster-site/manifest.json"></head>')

              if "install-pwa.js" not in html:
                  html=html.replace("</body>",
                  '<script src="/roster-site/install-pwa.js"></script></body>')

              f.write_text(html)
          EOF

      - name: Commit updated docs
        if: steps.check_changes.outputs.should_process == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add docs
          git commit -m "Update site + PWA" || echo "No changes"
          git push
