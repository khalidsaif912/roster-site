name: EXPORT Roster Site 
on:
  workflow_dispatch: {}
  schedule:
    - cron: "*/10 * * * *"

permissions:
  contents: write

jobs:
  build_import:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check if Import Excel file changed
        id: check_import_changes
        env:
          IMPORT_EXCEL_URL: ${{ secrets.IMPORT_EXCEL_URL }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: |
          python << 'EOF'
          import os
          import base64
          import hashlib
          import requests
          from pathlib import Path
          import sys
          from datetime import datetime, timezone, timedelta
          from urllib.parse import urlparse, parse_qsl, urlencode, urlunparse

          def candidate_urls(url):
              candidates = []
              u = urlparse(url)
              host = (u.netloc or "").lower()
              if not ("sharepoint.com" in host or "onedrive.live.com" in host or "1drv.ms" in host):
                  return [url]
              encoded = base64.b64encode(url.encode("utf-8")).decode("utf-8")
              encoded = encoded.rstrip("=").replace("/", "_").replace("+", "-")
              candidates.append(f"https://api.onedrive.com/v1.0/shares/u!{encoded}/root/content")
              qs = dict(parse_qsl(u.query, keep_blank_values=True))
              qs["download"] = "1"
              candidates.append(urlunparse(u._replace(query=urlencode(qs, doseq=True))))
              candidates.append(url)
              return candidates

          def download_excel(url):
              headers = {
                  "User-Agent": "Mozilla/5.0 (GitHub Actions) roster-site",
                  "Accept": "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,*/*",
              }
              for i, dl_url in enumerate(candidate_urls(url), 1):
                  try:
                      print(f"  [Strategy {i}] {dl_url[:80]}...")
                      r = requests.get(dl_url, headers=headers, timeout=60, allow_redirects=True)
                      r.raise_for_status()
                      data = r.content or b""
                      if data.startswith(b"PK"):
                          print(f"  ✅ Strategy {i} succeeded!")
                          return data
                      print(f"  ⚠️  Strategy {i}: not xlsx, trying next...")
                  except Exception as e:
                      print(f"  ⚠️  Strategy {i} failed: {e}")
              return None

          def main():
              try:
                  is_manual = os.getenv('GITHUB_EVENT_NAME') == 'workflow_dispatch'
                  excel_url = os.getenv('IMPORT_EXCEL_URL')
                  if not excel_url:
                      print("IMPORT_EXCEL_URL not found")
                      sys.exit(1)

                  print(f"Checking: {excel_url[:60]}...")
                  data = download_excel(excel_url)

                  if not data:
                      print("❌ Could not download Excel file")
                      sys.exit(1)

                  current_hash = hashlib.md5(data).hexdigest()
                  print(f"Excel MD5: {current_hash}")

                  cache_file = "import_last_filename.txt"
                  changed = True
                  old_hash = "none"

                  if Path(cache_file).exists():
                      old_hash = Path(cache_file).read_text(encoding='utf-8').strip()
                      if old_hash == current_hash:
                          print("No changes detected")
                          changed = False
                      else:
                          print(f"Change detected! (hash changed)")
                  else:
                      print("First run")

                  Path(cache_file).write_text(current_hash, encoding='utf-8')

                  muscat_tz = timezone(timedelta(hours=4))
                  now = datetime.now(muscat_tz)
                  print(f"Muscat time: {now.strftime('%H:%M')}")

                  # ✅ ساعة 7 صباحاً فقط للتحديث الإجباري اليومي
                  is_morning_update = (now.hour == 7)
                  should_process = changed or is_morning_update or is_manual

                  # ✅ إرسال الإيميل: عند تغيير الروستر أو الساعة 7 صباحاً
                  should_send_email = changed or is_morning_update or is_manual

                  print(f"File changed:      {changed}")
                  print(f"Morning update:    {is_morning_update}")
                  print(f"Manual trigger:    {is_manual}")
                  print(f"Should process:    {should_process}")
                  print(f"Should send email: {should_send_email}")

                  with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                      f.write(f"changed={str(changed).lower()}\n")
                      f.write(f"should_process={str(should_process).lower()}\n")
                      f.write(f"should_send_email={str(should_send_email).lower()}\n")
                      f.write(f"filename={current_hash}\n")
                      f.write(f"old_filename={old_hash}\n")
                      f.write(f"muscat_time={now.strftime('%H:%M')}\n")
                      f.write(f"muscat_date={now.strftime('%Y-%m-%d')}\n")

                  print("=" * 60)
                  print(f"  File changed:      {changed}")
                  print(f"  Morning update:    {is_morning_update}")
                  print(f"  Manual trigger:    {is_manual}")
                  print(f"  Should process:    {should_process}")
                  print(f"  Should send email: {should_send_email}")
                  print("=" * 60)

              except Exception as e:
                  print(f"Unexpected error: {e}")
                  import traceback
                  traceback.print_exc()
                  sys.exit(1)

          if __name__ == "__main__":
              main()
          EOF

      - name: Display change info
        run: |
          echo "========================================"
          echo "Import Check Report:"
          echo "========================================"
          echo "File changed:      ${{ steps.check_import_changes.outputs.changed }}"
          echo "Should process:    ${{ steps.check_import_changes.outputs.should_process }}"
          echo "Should send email: ${{ steps.check_import_changes.outputs.should_send_email }}"
          echo "Current file:      ${{ steps.check_import_changes.outputs.filename }}"
          echo "Previous file:     ${{ steps.check_import_changes.outputs.old_filename }}"
          echo "Muscat time:       ${{ steps.check_import_changes.outputs.muscat_time }}"
          echo "========================================"

      - name: Generate Import pages
        if: steps.check_import_changes.outputs.should_process == 'true'
        env:
          IMPORT_EXCEL_URL: ${{ secrets.IMPORT_EXCEL_URL }}
          IMPORT_SOURCE_NAME_URL: ${{ secrets.IMPORT_SOURCE_NAME_URL }}
          PAGES_BASE_URL: ${{ secrets.PAGES_BASE_URL }}
        run: |
          pip install pandas openpyxl requests --quiet
          echo "Generating /docs/import ..."
          python generate_and_send_import.py
          echo "Done!"

      - name: Send Email Notification
        if: steps.check_import_changes.outputs.should_send_email == 'true'
        env:
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          PAGES_BASE_URL: ${{ secrets.PAGES_BASE_URL }}
          IMPORT_EXCEL_URL: ${{ secrets.IMPORT_EXCEL_URL }}
        run: |
          pip install pandas openpyxl requests --quiet
          python << 'EOF'
          import os, sys, smtplib, base64, re, datetime as dt, hashlib, requests
          import pandas as pd
          from email.mime.multipart import MIMEMultipart
          from email.mime.text import MIMEText
          from urllib.parse import urlparse, parse_qsl, urlencode, urlunparse
          from collections import defaultdict

          # ── إعدادات ──────────────────────────────────────────────────
          MUSCAT_OFFSET = 4
          DEPT_FULL = {
              "SUPV": "Supervisors",       "FLTI": "Flight Dispatch (Import)",
              "FLTE": "Flight Dispatch (Export)", "CHKR": "Import Checkers",
              "OPTR": "Import Operators",  "DOCS": "Documentation",
              "RELC": "Release Control",
          }

          # ── تحميل Excel ──────────────────────────────────────────────
          def candidate_urls(url):
              u = urlparse(url)
              host = (u.netloc or "").lower()
              if not ("sharepoint.com" in host or "onedrive.live.com" in host or "1drv.ms" in host):
                  return [url]
              encoded = base64.b64encode(url.encode()).decode().rstrip("=").replace("/","_").replace("+","-")
              qs = dict(parse_qsl(u.query, keep_blank_values=True))
              qs["download"] = "1"
              return [
                  f"https://api.onedrive.com/v1.0/shares/u!{encoded}/root/content",
                  urlunparse(u._replace(query=urlencode(qs, doseq=True))),
                  url,
              ]

          def download_excel(url):
              headers = {"User-Agent": "Mozilla/5.0 (GitHub Actions) roster-site",
                         "Accept": "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,*/*"}
              for dl_url in candidate_urls(url):
                  try:
                      r = requests.get(dl_url, headers=headers, timeout=60, allow_redirects=True)
                      r.raise_for_status()
                      if r.content.startswith(b"PK"):
                          return r.content
                  except Exception:
                      pass
              return None

          # ── parse الشيت ──────────────────────────────────────────────
          def shift_bucket(code):
              s = (code or "").strip().upper()
              if not s: return ("Other", "•", "#94a3b8", "#f1f5f9")
              if s in {"O","OFF","OFFDAY","OFF DAY"}: return ("Off Day",       "🛋️", "#6366f1", "#e0e7ff")
              if s.startswith(("MN","ME")):            return ("Morning",       "☀️", "#f59e0b", "#fef3c7")
              if s.startswith(("AN","AE")):            return ("Afternoon",     "🌤️", "#f97316", "#ffedd5")
              if s.startswith(("NN","NE")):            return ("Night",         "🌙", "#8b5cf6", "#ede9fe")
              if s.startswith(("ST","SB")):            return ("Standby",       "🧍", "#9e9e9e", "#f0f0f0")
              if "SICK" in s or s.startswith("SL"):    return ("Sick Leave",    "🤒", "#ef4444", "#fee2e2")
              if "ANNUAL" in s or s.startswith("AL"):  return ("Annual Leave",  "✈️", "#10b981", "#d1fae5")
              if "TR" in s or "TRAIN" in s:            return ("Training",      "🎓", "#0ea5e9", "#e0f2fe")
              return ("Other", "•", "#94a3b8", "#f1f5f9")

          def parse_today_shifts(xlsx_bytes, today_day):
              """يرجع dict: dept_name -> bucket -> [emp_name, ...]"""
              import tempfile, pathlib
              tmp = pathlib.Path(tempfile.mktemp(suffix=".xlsx"))
              tmp.write_bytes(xlsx_bytes)
              xls = pd.ExcelFile(str(tmp))

              now_utc = dt.datetime.utcnow().replace(tzinfo=dt.timezone.utc)
              muscat  = now_utc.astimezone(dt.timezone(dt.timedelta(hours=MUSCAT_OFFSET)))
              curr_key = muscat.strftime("%Y-%m")
              target_month = muscat.strftime("%B").lower()

              sheet = None
              for sn in xls.sheet_names:
                  if target_month in sn.lower():
                      sheet = sn; break
              if not sheet:
                  sheet = xls.sheet_names[0]

              df = pd.read_excel(str(tmp), sheet_name=sheet, header=None)

              # ابحث عن صف الأيام
              day_row = None
              for i in range(min(60, len(df))):
                  row = df.iloc[i].astype(str).str.upper().tolist()
                  if any("SUN" == c.strip() for c in row) and any("MON" == c.strip() for c in row):
                      day_row = i; break
              if day_row is None: return {}

              header_row, jd_col = day_row + 1, 0
              for j in range(day_row, min(day_row+6, len(df))):
                  for c in range(df.shape[1]):
                      if str(df.iloc[j, c]).strip().upper() == "JD":
                          header_row, jd_col = j, c; break
                  if jd_col: break

              name_col = jd_col + 1

              # أعمدة التواريخ
              date_cols = {}
              for c in range(df.shape[1]):
                  v = df.iloc[header_row, c]
                  if isinstance(v, (int, float)) and not pd.isna(v) and float(v).is_integer():
                      d = int(v)
                      if 1 <= d <= 31: date_cols[d] = c

              result = defaultdict(lambda: defaultdict(list))
              for r in range(header_row+1, len(df)):
                  dept = df.iloc[r, jd_col]
                  name = df.iloc[r, name_col] if df.shape[1] > name_col else None
                  if pd.isna(dept) or pd.isna(name) or str(name).strip() == "": continue
                  dept_s = str(dept).strip()
                  if not dept_s or re.fullmatch(r"\d+", dept_s): continue
                  dept_name = DEPT_FULL.get(dept_s, dept_s)
                  col = date_cols.get(today_day)
                  if col is None: continue
                  cell = df.iloc[r, col] if col < df.shape[1] else None
                  if pd.isna(cell) or str(cell).strip() == "": continue
                  code = str(cell).strip()
                  bucket, icon, color, bg = shift_bucket(code)
                  result[dept_name][f"{icon} {bucket}"].append(str(name).strip())

              tmp.unlink(missing_ok=True)
              return result

          # ── بناء HTML الجدول ─────────────────────────────────────────
          def build_shifts_html(shifts_by_dept):
              if not shifts_by_dept:
                  return '<p style="color:#718096;text-align:center;">لا توجد بيانات متاحة لهذا اليوم.</p>'

              BUCKET_ORDER = ["☀️ Morning","🌤️ Afternoon","🌙 Night","🧍 Standby",
                              "✈️ Annual Leave","🤒 Sick Leave","🎓 Training","🛋️ Off Day","• Other"]
              BUCKET_COLOR = {
                  "☀️ Morning":     ("#f59e0b","#fef3c7","#92400e"),
                  "🌤️ Afternoon":   ("#f97316","#ffedd5","#9a3412"),
                  "🌙 Night":        ("#8b5cf6","#ede9fe","#5b21b6"),
                  "🧍 Standby":     ("#9e9e9e","#f0f0f0","#555555"),
                  "✈️ Annual Leave": ("#10b981","#d1fae5","#065f46"),
                  "🤒 Sick Leave":   ("#ef4444","#fee2e2","#991b1b"),
                  "🎓 Training":     ("#0ea5e9","#e0f2fe","#075985"),
                  "🛋️ Off Day":     ("#6366f1","#e0e7ff","#3730a3"),
                  "• Other":        ("#94a3b8","#f1f5f9","#475569"),
              }

              html = ""
              for dept, buckets in sorted(shifts_by_dept.items()):
                  html += f'''
                  <tr><td colspan="2" style="padding:18px 32px 6px;text-align:right;">
                    <span style="font-size:15px;font-weight:bold;color:#1a365d;
                                 border-bottom:2px solid #bee3f8;padding-bottom:4px;">
                      🏢 {dept}
                    </span>
                  </td></tr>'''

                  for bucket in BUCKET_ORDER:
                      if bucket not in buckets: continue
                      names = buckets[bucket]
                      accent, bg, text = BUCKET_COLOR.get(bucket, ("#94a3b8","#f1f5f9","#475569"))
                      names_str = " &nbsp;·&nbsp; ".join(names)
                      html += f'''
                  <tr>
                    <td style="padding:6px 32px 6px 8px;vertical-align:top;width:140px;text-align:right;">
                      <span style="display:inline-block;background:{bg};color:{text};
                                   border-radius:12px;padding:3px 10px;font-size:12px;font-weight:bold;
                                   border:1px solid {accent};">
                        {bucket} &nbsp;<span style="background:{accent};color:#fff;
                          border-radius:10px;padding:1px 7px;font-size:11px;">{len(names)}</span>
                      </span>
                    </td>
                    <td style="padding:6px 8px 6px 32px;font-size:13px;color:#2d3748;text-align:left;">
                      {names_str}
                    </td>
                  </tr>'''

              return html

          # ── Main ─────────────────────────────────────────────────────
          smtp_server   = os.getenv("SMTP_SERVER", "smtp.gmail.com")
          smtp_port     = int(os.getenv("SMTP_PORT", "587"))
          smtp_user     = os.getenv("SMTP_USER", "")
          smtp_password = os.getenv("SMTP_PASSWORD", "")
          email_from    = os.getenv("EMAIL_FROM", smtp_user)
          email_to_raw  = os.getenv("EMAIL_TO", "")
          pages_url     = os.getenv("PAGES_BASE_URL", "").rstrip("/")
          excel_url     = os.getenv("IMPORT_EXCEL_URL", "")

          changed     = "${{ steps.check_import_changes.outputs.changed }}" == "true"
          is_manual   = "${{ github.event_name }}" == "workflow_dispatch"
          muscat_date = "${{ steps.check_import_changes.outputs.muscat_date }}"
          muscat_time = "${{ steps.check_import_changes.outputs.muscat_time }}"
          roster_url  = f"{pages_url}/import/" if pages_url else "#"

          now_utc = dt.datetime.utcnow().replace(tzinfo=dt.timezone.utc)
          muscat  = now_utc.astimezone(dt.timezone(dt.timedelta(hours=MUSCAT_OFFSET)))
          today_day = muscat.day

          # تحميل Excel وتحليل مناوبات اليوم
          print("📥 Downloading Excel for email roster summary...")
          xlsx_bytes = download_excel(excel_url) if excel_url else None
          shifts_by_dept = {}
          if xlsx_bytes:
              try:
                  shifts_by_dept = parse_today_shifts(xlsx_bytes, today_day)
                  print(f"✅ Parsed {len(shifts_by_dept)} departments")
              except Exception as e:
                  print(f"⚠️ Could not parse shifts: {e}")
          else:
              print("⚠️ Could not download Excel — email will have no roster data")

          shifts_html = build_shifts_html(shifts_by_dept)
          total_emp   = sum(len(names) for buckets in shifts_by_dept.values() for names in buckets.values())

          if changed:
              subject    = f"📋 Import Roster Updated — {muscat_date}"
              badge      = "#e53e3e"
              badge_text = "🔄 تحديث جديد في الروستر"
              note       = "تم اكتشاف تغيير في ملف الروستر — يوجد أدناه جدول مناوبات اليوم المحدّث."
          elif is_manual:
              subject    = f"📋 Import Roster (Manual) — {muscat_date}"
              badge      = "#805ad5"
              badge_text = "🛠️ تشغيل يدوي"
              note       = "جدول مناوبات اليوم:"
          else:
              subject    = f"📋 Import Roster — صباح الخير {muscat_date}"
              badge      = "#2b6cb0"
              badge_text = "🌅 التحديث الصباحي اليومي"
              note       = "جدول مناوبات اليوم — الساعة 7:00 صباحاً:"

          html_body = f"""<!DOCTYPE html>
          <html dir="rtl" lang="ar">
          <head><meta charset="UTF-8"></head>
          <body style="margin:0;padding:0;background:#f7fafc;font-family:Arial,sans-serif;">
            <table width="100%" cellpadding="0" cellspacing="0" style="background:#f7fafc;padding:30px 0;">
              <tr><td align="center">
                <table width="680" cellpadding="0" cellspacing="0"
                       style="background:#ffffff;border-radius:12px;overflow:hidden;
                              box-shadow:0 2px 12px rgba(0,0,0,0.10);">

                  <!-- Header -->
                  <tr>
                    <td colspan="2" style="background:#1a365d;padding:26px 32px;text-align:center;">
                      <h1 style="color:#ffffff;margin:0;font-size:22px;">📋 Import Duty Roster</h1>
                      <p style="color:#90cdf4;margin:8px 0 0;font-size:14px;">
                        {muscat_date} &nbsp;|&nbsp; {muscat_time} &nbsp;|&nbsp;
                        <strong style="color:#fff;">{total_emp} موظف</strong>
                      </p>
                    </td>
                  </tr>

                  <!-- Badge + Note -->
                  <tr>
                    <td colspan="2" style="padding:20px 32px 4px;text-align:center;">
                      <span style="display:inline-block;background:{badge};color:#fff;
                                   border-radius:20px;padding:7px 20px;font-size:13px;font-weight:bold;">
                        {badge_text}
                      </span>
                      <p style="font-size:14px;color:#4a5568;margin:14px 0 0;text-align:right;">{note}</p>
                    </td>
                  </tr>

                  <!-- Shifts Table -->
                  <tr>
                    <td colspan="2" style="padding:8px 0 16px;">
                      <table width="100%" cellpadding="0" cellspacing="0">
                        {shifts_html}
                      </table>
                    </td>
                  </tr>

                  <!-- CTA Button -->
                  <tr>
                    <td colspan="2" style="padding:8px 32px 28px;text-align:center;">
                      <a href="{roster_url}"
                         style="display:inline-block;background:#2b6cb0;color:#ffffff;
                                text-decoration:none;padding:13px 36px;border-radius:8px;
                                font-size:15px;font-weight:bold;">
                        عرض الجدول الكامل ←
                      </a>
                    </td>
                  </tr>

                  <!-- Footer -->
                  <tr>
                    <td colspan="2" style="background:#f7fafc;padding:14px 32px;text-align:center;
                               border-top:1px solid #e2e8f0;">
                      <p style="color:#a0aec0;font-size:11px;margin:0;">
                        يُرسل هذا البريد تلقائياً عند تحديث الروستر أو الساعة 7:00 صباحاً يومياً
                      </p>
                    </td>
                  </tr>

                </table>
              </td></tr>
            </table>
          </body>
          </html>"""

          recipients = [e.strip() for e in email_to_raw.split(",") if e.strip()]
          if not recipients:
              print("⚠️  EMAIL_TO is empty — skipping"); sys.exit(0)
          if not smtp_user or not smtp_password:
              print("⚠️  SMTP credentials missing — skipping"); sys.exit(0)

          msg = MIMEMultipart("alternative")
          msg["Subject"] = subject
          msg["From"]    = email_from
          msg["To"]      = ", ".join(recipients)
          msg.attach(MIMEText(html_body, "html", "utf-8"))

          try:
              with smtplib.SMTP(smtp_server, smtp_port) as server:
                  server.ehlo(); server.starttls()
                  server.login(smtp_user, smtp_password)
                  server.sendmail(email_from, recipients, msg.as_string())
              print(f"✅ Email sent → {', '.join(recipients)}")
          except Exception as e:
              print(f"❌ Failed to send email: {e}"); sys.exit(1)
          EOF

      - name: Commit updated Import docs
        if: steps.check_import_changes.outputs.should_process == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add docs/import import-rosters import_last_filename.txt
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            if [ "${{ steps.check_import_changes.outputs.changed }}" == "true" ]; then
              git commit -m "Update IMPORT roster: ${{ steps.check_import_changes.outputs.filename }}"
            else
              git commit -m "Scheduled IMPORT update"
            fi
            git pull --rebase
            git push
            echo "Pushed!"
          fi

      - name: Skip - No action needed
        if: steps.check_import_changes.outputs.should_process == 'false'
        run: |
          echo "========================================"
          echo "No action needed"
          echo "Current file: ${{ steps.check_import_changes.outputs.filename }}"
          echo "========================================"
