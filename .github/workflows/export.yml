name: export Roster Site

on:
  workflow_dispatch: {}
  schedule:
    - cron: "*/10 * * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate Roster pages
        env:
          EXCEL_URL:          ${{ secrets.EXPORT_EXCEL_URL }}
          SOURCE_NAME_URL:    ${{ secrets.EXPORT_SOURCE_NAME_URL }}
          PAGES_BASE_URL:     ${{ secrets.PAGES_BASE_URL }}
          SMTP_HOST:          ${{ secrets.SMTP_HOST }}
          SMTP_PORT:          ${{ secrets.SMTP_PORT }}
          SMTP_USER:          ${{ secrets.SMTP_USER }}
          SMTP_PASS:          ${{ secrets.SMTP_PASS }}
          MAIL_FROM:          ${{ secrets.MAIL_FROM }}
          MAIL_TO:            ${{ secrets.MAIL_TO }}
        run: |
          python generate_and_send.py

      - name: Commit updated docs
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add docs rosters
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto update EXPORT roster"
            git pull --rebase
            git push
            echo "Pushed!"
          fi
