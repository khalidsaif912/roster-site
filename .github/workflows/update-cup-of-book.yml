name: Update A Cup of Book

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pillow

      - name: Generate A Cup of Book page
        env:
          A_CUP_OF_BOOK: ${{ secrets.A_CUP_OF_BOOK }}
        run: |
          python extract_cup_of_book_images.py \
            --share-url "$A_CUP_OF_BOOK" \
            -o docs/a-cup-of-book

      - name: Commit and push if changed
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/a-cup-of-book extract_cup_of_book_images.py
          git commit -m "Auto-update A Cup of Book page"
          git push
