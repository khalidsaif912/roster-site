name: Build A Cup of Book Page

on:
  workflow_dispatch:
  push:
    paths:
      - 'docs/training/a-cup-of-book/images/**'
      - 'generate_a_cup_of_book_page.py'
      - '.github/workflows/update-a-cup-of-book-page.yml'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate A Cup of Book page
        run: |
          python generate_a_cup_of_book_page.py \
            --images-dir docs/training/a-cup-of-book/images \
            --output-dir docs/training/a-cup-of-book \
            --title "A Cup of Book"

      - name: Commit and push if changed
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/training/a-cup-of-book generate_a_cup_of_book_page.py .github/workflows/update-a-cup-of-book-page.yml
          git commit -m "Update A Cup of Book page"
          git push
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/a-cup-of-book generate_a_cup_of_book_page.py .github/workflows/update-a-cup-of-book-page.yml
          git commit -m "Update A Cup of Book page"
          git push
